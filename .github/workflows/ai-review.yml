name: AI Code Review

on:
  workflow_call:
    secrets:
      GEMINI_API_KEY:
        required: true

jobs:
  ai-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Get PR diff
        id: diff
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > diff.txt
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          head -c 5000 diff.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: AI Review
        uses: actions/github-script@v7
        with:
          script: |
            const diff = `${{ steps.diff.outputs.diff }}`;
            if (!process.env.GEMINI_API_KEY) {
              console.log("GEMINI_API_KEY is not set. Skipping AI review.");
              return;
            }
            
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${process.env.GEMINI_API_KEY}`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                contents: [{
                  parts: [{
                    text: `Review this code diff for security issues, bugs, and best practices. Be concise and format with markdown:\n\n${diff}`
                  }]
                }]
              })
            });
            
            const result = await response.json();
            if (!result.candidates || result.candidates.length === 0) {
              console.log("No review generated or API error:", JSON.stringify(result));
              return;
            }
            const review = result.candidates[0].content.parts[0].text;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🤖 AI Code Review (Gemini)\n\n${review}`
            });
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
