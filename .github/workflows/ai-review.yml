name: AI Code Review

on:
  workflow_call:
    secrets:
      GEMINI_API_KEY:
        required: true

jobs:
  ai-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Get PR diff
        id: diff
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > raw_diff.txt
          node -e "
            const fs = require('fs');
            const content = fs.readFileSync('raw_diff.txt', 'utf8');
            const parts = content.split('diff --git ');
            const filtered = parts.filter(p => {
              if (!p.trim()) return false;
              const path = p.split(' ')[0];
              const exclude = ['package-lock.json', 'yarn.lock', 'pnpm-lock.yaml', '.png', '.jpg', '.jpeg', '.svg', '.gif', '.ico'];
              return !exclude.some(x => path.includes(x));
            });
            fs.writeFileSync('diff.txt', filtered.map(p => 'diff --git ' + p).join(''));
          "
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          head -c 10000 diff.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: AI Review
        uses: actions/github-script@v7
        with:
          script: |
            const diff = process.env.PR_DIFF;
            if (!diff) {
              console.log("No diff found or PR_DIFF is empty.");
              return;
            }
            if (!process.env.GEMINI_API_KEY) {
              console.log("GEMINI_API_KEY is not set. Skipping AI review.");
              return;
            }
            
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${process.env.GEMINI_API_KEY}`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                contents: [{
                  parts: [{
                    text: `Review this code diff for security issues, bugs, and best practices. Be concise and format with markdown:\n\n${diff}`
                  }]
                }]
              })
            });
            
            const result = await response.json();
            if (!result.candidates || result.candidates.length === 0) {
              console.log("No review generated or API error:", JSON.stringify(result));
              return;
            }
            const review = result.candidates[0].content.parts[0].text;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🤖 AI Code Review (Gemini)\n\n${review}`
            });
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PR_DIFF: ${{ steps.diff.outputs.diff }}
