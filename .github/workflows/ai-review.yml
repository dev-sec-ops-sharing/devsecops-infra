name: AI Code Review

on:
  workflow_call:
    secrets:
      GEMINI_API_KEY:
        required: true

jobs:
  ai-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - name: Get PR diff
        id: diff
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > raw_diff.txt
          node -e "
            const fs = require('fs');
            const content = fs.readFileSync('raw_diff.txt', 'utf8');
            const parts = content.split('diff --git ');
            const filtered = parts.filter(p => {
              if (!p.trim()) return false;
              const path = p.split(' ')[0];
              const exclude = ['package-lock.json', 'yarn.lock', 'pnpm-lock.yaml', '.png', '.jpg', '.jpeg', '.svg', '.gif', '.ico'];
              return !exclude.some(x => path.includes(x));
            });
            fs.writeFileSync('diff.txt', filtered.map(p => 'diff --git ' + p).join(''));
          "
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          head -n 500 diff.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: AI Review
        uses: dev-sec-ops-sharing/devsecops-infra/actions/ai-code-review@main
        with:
          gemini-api-key: ${{ secrets.GEMINI_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
