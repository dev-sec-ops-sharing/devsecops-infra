name: DAST Scan

on:
  workflow_call:
    inputs:
      target-url:
        required: true
        type: string
    secrets:
      GOOGLE_CHAT_WEBHOOK:
        required: false

permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  zap-scan:
    name: 🌐 ZAP DAST Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🌐 Run ZAP Baseline Scan (Docker)
        run: |
          docker run --rm -v $(pwd):/zap/wrk/:rw ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t "${{ inputs.target-url }}" \
            -r report_html.html \
            -J report_json.json \
            -a || true

      - name: 📦 Upload ZAP Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-dast-report
          path: |
            report_html.html
            report_json.json

      - name: 🔔 Google Chat Notification
        if: always()
        run: |
          if [ -n "${{ secrets.GOOGLE_CHAT_WEBHOOK }}" ]; then
            STATUS="SUCCESS"
            EMOJI="🌐"
            if [ "${{ job.status }}" = "failure" ]; then
              STATUS="FAILED"
              EMOJI="❌"
            fi
            
            curl -X POST -H 'Content-Type: application/json' \
              "${{ secrets.GOOGLE_CHAT_WEBHOOK }}" \
              -d "{\"text\": \"$EMOJI *Pipeline:* DAST Scan\n*Target:* ${{ inputs.target-url }}\n*Status:* $STATUS\n*Commit:* ${{ github.sha }}\n*Branch:* ${{ github.ref_name }}\"}"
          else
            echo "GOOGLE_CHAT_WEBHOOK is not set. Skipping."
          fi
